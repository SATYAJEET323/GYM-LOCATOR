<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Registration Form</title>
<link rel="stylesheet" type="text/css" href="pass.css">
</head>
<body>
<div class="container">
  <h2>User Registration Form</h2>
  <form id="registrationForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" required placeholder="Format: 1234567890">

    <label for="password">Password:</label> <!-- New Password label -->
    <input type="password" id="password" name="password" required>

    <label for="gender" style="margin-bottom: 0;">Gender:</label>
    <select id="gender" name="gender" required>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>

    <input type="submit" value="Submit">
    <button onclick="redirectToLogin()">Back to Login</button> <!-- Back to Login button -->
  </form>
</div>
<script src="script12.js"></script>
<script>
  function redirectToLogin() {
    window.location.href = "login.html"; // Redirect to login page
  }
</script>
</body>
</html>
